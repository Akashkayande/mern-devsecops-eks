name: MERN DevSecOps Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'k8/backend/**'
      - 'k8/frontend/**'
      - 'README.md'

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  FRONTEND_REPO: frontend
  BACKEND_REPO: backend
  IMAGE_TAG: ${{ github.sha }}
  CLUSTER_NAME: mern-eks

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.projectKey=quickChat
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "quickChat"
          path: "."
          format: "ALL"
          failOnCVSS: 4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend Image
        run: |
          docker build -t $ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG ./server

      - name: Build Frontend Image
        run: |
          docker build -t $ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG ./client

      - name: Trivy Backend Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: $ECR_REGISTRY/$BACKEND_REPO:${{ github.sha }}
          severity: HIGH,MEDIUM
          exit-code: 1

      - name: Trivy Frontend Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: $ECR_REGISTRY/$FRONTEND_REPO:${{ github.sha }}
          severity: HIGH,MEDIUM
          exit-code: 1

      - name: Push Backend Image
        run: docker push $ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG

      - name: Push Frontend Image
        run: docker push $ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG

      // Update Image Tags in Kubernetes Manifests
      - name: Update Backend Image
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG|g" \
          k8/backend/backend-deployment-green.yaml

      - name: Update Frontend Image
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$ECR_REGISTRY/$FRONTEND_REPO:$IMAGE_TAG|g" \
          k8/frontend/frontend-deployment-green.yaml

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8/backend/
          kubectl apply -f k8/frontend/
          kubectl apply -f k8/ingress/