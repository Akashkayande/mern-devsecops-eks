apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend
  namespace: mern-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 407622020962.dkr.ecr.ap-south-1.amazonaws.com/frontend:3c91a11
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"
  strategy:
    blueGreen:
      activeService: frontend-service
      previewService: frontend-green-service
      autoPromotionEnabled: false 
      - analysis:
          templates:
          - templateName: frontend-rollback

