apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-blue
  namespace: mern-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      version: blue
  template:
    metadata:
      labels:
        app: frontend
        version: blue
    spec:
      containers:
      - name: frontend
        image: 407622020962.dkr.ecr.ap-south-1.amazonaws.com/frontend:3c91a11
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "300m"
            memory: "512Mi"
